# Pre-commit hooks configuration
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# CI: pre-commit run --all-files --show-diff-on-failure

repos:
  # Code formatting and linting with Ruff (replaces black, isort, flake8, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        additional_dependencies: [
          "pydantic>=2.9.0",
          "pydantic-settings>=2.6.0",
          "fastapi>=0.115.0",
          "sqlalchemy>=2.0.36",
          "httpx>=0.27.0",
          "sse-starlette>=2.1.0",
        ]
        args: [--strict, --show-error-codes, --pretty]

  # Security checks
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-r, app, -ll, --skip=B101,B104,B106,B601]
        exclude: ^tests/

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.23.1
    hooks:
      - id: gitleaks

  # Check for common issues
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-docstring-first
      - id: debug-logger
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python-specific checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-no-eval
      - id: python-no-log-warnings
      - id: requirements-txt-fixer

  # Sort imports with ruff (isort replacement)
  # Already covered by ruff above, but keeping for explicit config
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        name: ruff-import-sort
        args: [check, --select=I, --fix]
        exclude: ^tests/

# Configuration for ci/fail-fast behavior
fail_fast: false

# Only check staged files by default (faster)
# Override with --all-files for full check