[pytest]
asyncio_mode = auto
# Session-scoped loop keeps the shared async SQLAlchemy engine/pool valid
# across tests. Function-scoped loops close after each test and cause
# "Event loop is closed" / "another operation is in progress" with asyncpg.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
pythonpath = apps/copilot-api
